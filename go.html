<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>跳转中...</title>
</head>

<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');

        if (url) {
            // 直接跳转，不加工、不加https
            window.location.href = url;
        } else {
            document.write('请在链接后加上 ?url=跳转地址');
        }
    </script>
</body>
</script>
</body>

</html>
